name: Update HN data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: npm install
      - run: node update.mjs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      - name: Commit and push
        id: git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json images/ 2>/dev/null || git add data.json
          git diff --staged --quiet && echo "updated=false" >> $GITHUB_OUTPUT && exit 0
          git commit -m "auto: update HN data"
          git push
          echo "updated=true" >> $GITHUB_OUTPUT

      - name: Notify Slack
        if: steps.git.outputs.updated == 'true'
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text": "🌐 HN data updated\nRepo: ${{ github.repository }}\nEvent: ${{ github.event_name }}\nActor: ${{ github.actor }}\nRef: ${{ github.ref }}"
          }' \
          ${{ secrets.SLACK_WEBHOOK_URL }}
